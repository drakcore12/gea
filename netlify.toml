[build]
  publish = "."
  command = ""

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.images]
  compress = true

[[redirects]]
  from = "/privacidad"
  to = "/privacidad.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
