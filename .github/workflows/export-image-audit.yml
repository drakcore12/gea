name: Export image audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  export-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Package original work photographs
        run: |
          mkdir -p image-audit
          cp assets/img/originals/2026-06-20/*.jpeg image-audit/
      - name: Upload image audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: gea-image-audit
          path: image-audit/
          retention-days: 1
