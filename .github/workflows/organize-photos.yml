name: Organize service photos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - photo-audit-trigger.txt

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check pillow pillow-avif-plugin

      - name: Organize and optimize photographs
        run: python scripts/organize_photos.py

      - name: Validate result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('assets/images.json').read_text(encoding='utf-8'))
          assert manifest['summary']['total'] == 23
          assert manifest['summary']['selected'] == 8
          assert manifest['summary']['discardedFromPublishing'] == 6
          assert len(list(Path('assets/img/originals/2026-06-20').glob('*.jpeg'))) == 23
          assert len(list(Path('assets/img/services/electrico-comercial').glob('*.webp'))) == 8
          assert not list(Path('assets/img').glob('WhatsApp Image*.jpeg'))
          assert not Path('audit').exists()
          print(manifest['summary'])
          PY

      - name: Commit generated asset library
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "organize and optimize GEA service photographs [skip ci]"
            git push
          fi
