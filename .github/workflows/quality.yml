name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check theme-init.js
          node --check service-pages.js
          node --check home-ux.js
          node --check scripts/check.js

      - name: Validate static files
        run: node scripts/check.js
