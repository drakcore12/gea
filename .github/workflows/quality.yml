name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  assets-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate temporary assets inventory
        run: node scripts/assets-audit.js

      - name: Upload temporary image audit
        uses: actions/upload-artifact@v4
        with:
          name: gea-assets-audit
          path: |
            assets-inventory.json
            assets-audit.html
            assets/img/**
          if-no-files-found: error
          retention-days: 1

  static-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check theme-init.js
          node --check service-pages.js
          node --check home-ux.js
          node --check scripts/release.js
          node --check scripts/check.js

      - name: Validate source files
        run: node scripts/check.js

      - name: Simulate production release
        env:
          COMMIT_REF: ${{ github.sha }}
          CONTEXT: production
          URL: https://soluciones-gea.netlify.app
        run: node scripts/release.js

      - name: Validate versioned release
        run: node scripts/check.js
